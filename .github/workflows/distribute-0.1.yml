on:
  push:
    tags:
      - '0.1.*' # secrets are tied to version 0.1
  workflow_dispatch: # allow manual triggering from GitHub page

jobs:
  distribute:
    # The secrets created by `./dk0 prepare-version --ci github VERSION`
    # are tied to this environment only.
    environment: dk-distribution
    strategy:
      fail-fast: false
      matrix:
        include:
          - runs-on: windows-latest
            distscript: dist/Windows_x86_64.u
          - runs-on: windows-latest
            distscript: dist/Windows_x86.u
            target-abi: Windows_x86
          # Linux builds run in the manylinux glibc 2.28 container for broad
          # release compatibility (matches CommonsBase_GNU).
          - runs-on: ubuntu-latest
            image: quay.io/pypa/manylinux_2_28_x86_64:2026.04.08-5
            distscript: dist/Linux_x86_64.u
            target-abi: Linux_x86_64
          - runs-on: ubuntu-latest
            image: quay.io/pypa/manylinux_2_28_x86_64:2026.04.08-5
            distscript: dist/Linux_x86.u
            target-abi: Linux_x86
          # Darwin arm64 native, and Darwin x86_64 cross-built, both on the
          # Apple-silicon macos-latest runner (no Intel runner needed).
          - runs-on: macos-latest
            distscript: dist/Darwin_arm64.u
            execution-abi: Darwin_arm64
          - runs-on: macos-latest
            distscript: dist/Darwin_x86_64.u
            execution-abi: Darwin_arm64
            target-abi: Darwin_x86_64
          # Linux arm64 is disabled until the arm64 toolchain ecosystem is
          # ready (mirrors CommonsBase_GNU). Two blockers:
          #   1. CommonsBase_Std.Coreutils has no Release.Linux_arm64 slot yet,
          #      so the host-build commands cannot fetch coreutils.
          #   2. dk0 has no native arm64 binary, so it must bootstrap MlFront
          #      from HEAD (experimental-mlfront-ref: true). Mixing that with
          #      the other non-experimental jobs makes the combine step fail on
          #      a producer-version mismatch.
          # - runs-on: ubuntu-24.04-arm
          #   image: quay.io/pypa/manylinux_2_28_aarch64:2026.04.08-5
          #   distscript: dist/Linux_arm64.u
          #   experimental-mlfront-ref: true
    runs-on: ${{ matrix.runs-on }}
    container:
      image: ${{ matrix.image }}

    steps:
      - name: Harden Runner # Optional but recommended
        continue-on-error: true
        uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
        with: { egress-policy: audit }
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Prepare Linux_x86 multilib toolchain
        if: ${{ matrix.distscript == 'dist/Linux_x86.u' }}
        run: dnf install -y glibc-devel.i686 libgcc.i686 libstdc++.i686 gcc-toolset-14-libstdc++-devel.i686

      - name: Distribute Modules
        uses: diskuv/dk-distribute@v3
        with:
          pubkey: ${{ secrets.distribute_0_1_pubkey }}
          seckey: ${{ secrets.distribute_0_1_seckey }}
          options: ${{ matrix.options || '-nosysinc' }}
          # Default 'release' does incremental builds off the previous release's
          # stores. To force a clean, no-restore rebuild (e.g. to purge stale
          # references baked into the restored cache) WITHOUT editing this file,
          # set the repository variable DK_STORE=none before pushing the tag,
          # then delete it afterward -- repo variables are readable on tag
          # pushes, so no commit dance is needed:
          #   gh variable set DK_STORE --body none
          #   git tag 0.1.<ts> && git push origin 0.1.<ts>
          #   gh variable delete DK_STORE   # restore incremental builds
          store: ${{ vars.DK_STORE || 'release' }}
          distscript: ${{ matrix.distscript }}
          execution-abi: ${{ matrix.execution-abi }}
          target-abi: ${{ matrix.target-abi }}
          experimental-mlfront-ref: ${{ (github.ref_type != 'tag' || matrix.experimental-mlfront-ref) && 'HEAD' }}

  combine:
    needs: distribute
    permissions:
      contents: write # for action-gh-release
      id-token: write # for actions/attest-build-provenance
      attestations: write # for actions/attest-build-provenance
      artifact-metadata: write # for actions/attest-build-provenance

    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner # Optional but recommended
        uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
        with: { egress-policy: audit }
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Combine Modules
        uses: diskuv/dk-distribute/combine@v3

      - name: Attest
        id: attest
        uses: actions/attest-build-provenance@v3
        with: { subject-path: dk-dist/* }

      - name: Release ${{ github.job }}
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2.6.1. Mar 15, 2026
        with: { files: dk-dist/*, body_path: ".dist-CHANGELOG.txt" }
